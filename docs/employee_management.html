<!DOCTYPE html>
<html>
    <head>
        <title>Employee List</title>
        <link rel="stylesheet" href="login.css" />
        <style>
            body {
                align-items: flex-start;
                padding: 40px 20px;
                flex-direction: column;
                justify-content: flex-start;
                min-height: 100vh;
            }

            .card {
                background: rgba(255,255,255,0.28)
                box-shadow: 0 8px 24px rgba(0,0,0,0.18);
                border-radius: 28px;
                padding: 40px 50px;
                width: 1100px;
                max-width: 90vw;
                margin: 0 auto;
            }

            h1 {
                font-size: 32px;
                margin-bottom: 24px;
                color: #1f2a37;
            }

            .section-title {
                font-size: 15px;
                font-weight: 700;
                color: #1f2a37;
                margin: 0 0 16px 0;
                padding-bottom: 6px;
                border-bottom: 1px solid rgba(0,0,0,0.1);
            }

            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px 24px;
            }

            .form-group {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }

            label {
                font-size: 13px;
                font-weight: 600;
                color: #1f2a37;
            }

            input, select {
                padding: 10px 14px;
                border-radius: 12px;
                border: none;
                font-size: 14px;
                background: rgba(255,255,255,0.65);
                color: #1f2a37;
                width: 100%;
                box-sizing: border-box;
            }

            input:focus, select:focus {
                outline: 2px solid #5f90d8;
            }

            .btn-row {
                display: flex;
                gap: 12px;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }

            .search-row {
                display: flex;
                gap: 10px;
                margin-bottom: 16px;
                flex-wrap: wrap;
                align-items: center;
            }

            .search-row input {
                padding: 9px 14px;
                border-radius: 12px;
                border: none;
                font-size: 14px;
                background: rgba(255,255,255,0.65);
                color: #1f2a37;
                width: 280px;
            }

            .search-row input:focus {
                outline: 2px solid #5f90d8;
            }

            button.secondary {
                background-color: #7a8fa6;
            }

            button.danger {
                background-color: #c0392b;
            }

            button.success {
                background-color: #27ae60;
            }

            button.small {
                padding: 6px 12px;
                font-size: 12px;
                margin: 0 2px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
            }

            th {
                background-color: #5f90d8;
                color: white;
                padding: 10px 14px;
                text-align: left;
                font-weight: 600;
            }

            td {
                padding: 9px 14px;
                border-bottom: 1px solid rgba(0,0,0,0.08);
                color: #1f2a37;
            }
            
            tr:nth-child(even) td { background: rgba(255,255,255,0.35); }
            tr:nth-child(odd)  td { background: rgba(255,255,255,0.15); }

            .status-msg {
                font-size: 14px;
                color: #1f2a37;
                font-style: italic;
                margin-bottom: 12px;
            }

            input.inline-edit {
                padding: 6px 10px;
                border-radius: 8px;
                border: none;
                font-size: 13px;
                background: rgba(255,255,255,0.85);
                color: #1f2a37;
                width: 100%;
            }

            .msg {
                margin-top: 10px;
                font-size: 14px;
                font-weight: 600;
                padding: 10px 14px;
                border-radius: 10px;
                display: none;
            }

            .msg.success { background: rgba(100,200,130,0.35); color: #1a5c30; display: block; }
            .msg.error { background: rgba(220,80,80,0.25); color: #7a1a1a; display: block; }
            }
        </style>
    </head>
    <body>

        <!-- ADD EMPLOYEE FORM -->
         <div class="card">
            <h1>Employee Management</h1>

            <div class="section-title">Add New Employee</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="add-firstname" placeholder="First Name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="add-lastname" placeholder="Last Name">
                </div>
                <div class="form-group">
                    <label>Middle Initial</label>
                    <input type="text" id="add-middle" placeholder="M" maxlength="1">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="add-username" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="text" id="add-password" placeholder="Initial Password">
                </div>
                <div class="form-group">
                    <label>SSN</label>
                    <input type="text" id="add-ssn" placeholder="123456789" maxlength="9">
                </div>
                <div class="form-group">
                    <label>Pay Rate</label>
                    <input type="number" id="add-hours" placeholder="0" min="0" value="0">
                </div>
            </div>

            <div class="msg" id="addMsg"></div>

            <div class="btn-row" style="margin-top:20px;">
                <button onclick="addEmployee()">Add Employee</button>
                <button class="secondary" onclick="window.location.href='employee.html'">&#8592; Back</button>
            </div>
         </div>

        <!-- EMPLOYEE LIST -->
        <div class="card">
            <div class="section-title">Employee List</div>

            <div class="btn-row">
                <button onclick="loadEmployees()">&#8635; Refresh</button>
                <button class="secondary" onclick="window.location.href='employee.html'">&#8592; Back</button>
            </div>

            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Search by name..." oninput="searchEmployees()">
            </div>

            <div class="msg" id="actionMsg"></div>
            <div class="status-msg" id="status"></div>
            <div id="employeeTable"></div>
        </div>

        <script>
            
        </script>
    </body>
</html>
