<!DOCTYPE html>
<html>
    <head>Buy Tickets</head>

    <body>
        <h1>Buy tickets to your favorite attractions here!</h1>
        <p>Please enter your customer ID and select the attraction you wish to purchase a ticket or tickets for.</p>
            <label>Customer ID:</label>
            <input type="number" name="customer_id" id="customerID" placeholder="Customer ID" required min="1"><br><br>

            <h3>Add Tickets</h3>

            <select name="ride_id" id="rideSelect" required>
            <option value="Ride1">Ride1</option>
            <option value="Ride2">Ride2</option>
            <option value="Ride3">Ride3</option>
            </select>
            <select name="ticket_type" id="adultOrChild" required>
            <option value="Adult">Adult</option>
            <option value="Child">Child</option>
            </select>
            <input type="number" name="ticket_quantity" id="ticketQuantity" placeholder="Quantity" min="1" required>
            <br><br>

            <button type="button" onclick="addToCart()">Add to Cart</button>

            <h3>Your Cart</h3>
            <ul id="cartList"></ul>
            <br>
            <h3>Total: $<span id="totalPrice">0</span></h3>
            <button onclick="checkout()">Checkout</button>

            <script src="cart.js"></script>
    </body>
</html>
