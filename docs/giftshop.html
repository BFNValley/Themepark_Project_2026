<!DOCTYPE html>
<html>
<head>
  <title>Gift Shop (Employee)</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #2c3e50;
    }

    .subtitle {
      text-align: center;
      color: #7f8c8d;
      margin-bottom: 30px;
      font-size: 14px;
    }

    h2 {
      color: #34495e;
      margin-top: 25px;
      margin-bottom: 15px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background-color: #2c3e50;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 10px;
    }

    button:hover {
      background-color: #1a252f;
    }

    hr {
      margin: 30px 0;
      border: none;
      border-top: 1px solid #eee;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #ecf0f1;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Gift Shop</h1>
  <p class="subtitle">Employee Inventory Management</p>

  <h2>Inventory Management</h2>

  <label>Product Name</label>
  <input id="newName" type="text">

  <label>Price ($)</label>
  <input id="newPrice" type="number">

  <label>Stock</label>
  <input id="newStock" type="number">

  <button onclick="addProduct()">Add Product</button>

  <label>Remove Product</label>
  <select id="removeItem"></select>

  <button onclick="removeProduct()">Remove Product</button>

  <hr>

  <h2>Current Inventory</h2>
  <ul id="inventoryList"></ul>
</div>

<script>

// PRODUCTS FROM BACKEND
let products = [];

// LOAD PRODUCTS FROM DATABASE
function loadProducts() {
  fetch('/products')
    .then(res => res.json())
    .then(data => {
      products = data;
      updateUI();
    })
    .catch(err => {
      console.error("Error loading products:", err);
    });
}

// UPDATE UI
function updateUI() {
  const removeSelect = document.getElementById("removeItem");
  const inventoryList = document.getElementById("inventoryList");

  removeSelect.innerHTML = "";
  inventoryList.innerHTML = "";

  products.forEach((product, index) => {

    let option = document.createElement("option");
    option.value = index;
    option.text = product.Name;
    removeSelect.appendChild(option);

    let li = document.createElement("li");
    li.textContent = product.Name + " | $" + product.Price + " | Stock: " + product.Stock;
    inventoryList.appendChild(li);
  });
}

// ADD PRODUCT 
function addProduct() {
  alert("Backend POST not implemented yet");
}

// REMOVE PRODUCT
function removeProduct() {
  alert("Backend DELETE not implemented yet");
}

// INITIAL LOAD
loadProducts();

</script>

</body>
</html>
