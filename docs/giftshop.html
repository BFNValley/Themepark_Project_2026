<!DOCTYPE html>
<html>
<head>
  <title>Gift Shop (Employee)</title>
</head>

<body>

<h1>Gift Shop - Employee Management</h1>

<h2>Inventory Management</h2>

<label>Product Name:</label><br>
<input id="newName" type="text">

<br><br>

<label>Price:</label><br>
<input id="newPrice" type="number">

<br><br>

<label>Stock:</label><br>
<input id="newStock" type="number">

<br><br>

<button onclick="addProduct()">Add Product</button>

<br><br>

<label>Remove Product:</label><br>
<select id="removeItem"></select>

<br><br>

<button onclick="removeProduct()">Remove Product</button>

<hr>

<h2>Current Inventory</h2>
<ul id="inventoryList"></ul>

<script>

// PRODUCT LIST (acts like database)
let products = [
  { name: "T-Shirt", price: 20, stock: 10 },
  { name: "Hat", price: 15, stock: 8 },
  { name: "Plush Toy", price: 25, stock: 5 }
];

// UPDATE UI
function updateUI() {
  const removeSelect = document.getElementById("removeItem");
  const inventoryList = document.getElementById("inventoryList");

  removeSelect.innerHTML = "";
  inventoryList.innerHTML = "";

  products.forEach((product, index) => {

    // Remove dropdown
    let option = document.createElement("option");
    option.value = index;
    option.text = product.name;
    removeSelect.appendChild(option);

    // Inventory display
    let li = document.createElement("li");
    li.textContent = product.name + " | $" + product.price + " | Stock: " + product.stock;
    inventoryList.appendChild(li);
  });
}

// ADD PRODUCT (with trigger-like validation)
function addProduct() {
  const name = document.getElementById("newName").value;
  const price = parseInt(document.getElementById("newPrice").value);
  const stock = parseInt(document.getElementById("newStock").value);

  // Basic validation
  if (!name || isNaN(price) || isNaN(stock)) {
    alert("Please fill all fields correctly");
    return;
  }

  // 🔥 Trigger simulation: prevent negative stock
  if (stock < 0) {
    alert("Stock cannot be negative (trigger enforced)");
    return;
  }

  products.push({ name, price, stock });
  alert("Product added!");

  updateUI();
}

// REMOVE PRODUCT
function removeProduct() {
  const index = document.getElementById("removeItem").value;

  if (products.length === 0) {
    alert("No products to remove");
    return;
  }

  products.splice(index, 1);

  alert("Product removed!");
  updateUI();
}

// INITIAL LOAD
updateUI();

/*
Trigger Simulation:
- Prevents invalid data such as negative stock
- In the real system, this is enforced using SQL triggers
*/

</script>

</body>
</html>
