<!doctype html>
<html>
  <head>
    <title>Customer Complaint Form</title>
    <link rel="stylesheet" href="complaint_form.css" />
  </head>

  <body>
    <div class="complaint-card">
      <h1>Customer Complaint Form</h1>
      <form action="/submit-complaint" method="POST">
        <div class="subject-reason">
          <label for="complaint-reason">Reason for complaint:</label>
          <select id="complaint-reason" name="reason" required>
            <option value="ride1">Ride 1</option>
            <option value="ride1">Ride 2</option>
            <option value="ride1">Ride 3</option>
            <option value="ride1">Ride 4</option>
            <option value="giftshop">Gift Shop</option>
            <option value="employee">Employee</option>
            <option value="cleanliness">Cleanliness</option>
            <option value="payments/tickets">Payments/Tickets</option>
            <option value="other">Other</option>
          </select>
          <div id="other-container">
            <label for="other-reason">Please specify:</label>
            <input type="text" id="other-reason" name="other-reason" />
          </div>
        </div>
        <label for="complaint-description">Describe the complaint:</label>
        <textarea
          id="complaint-description"
          name="description"
          placeholder="Description of complaint"
          required
        >
        </textarea>
        <div class="input-row">
          <div class="input-group">
            <label for="fname">First name:</label>
            <input type="text" id="fname" name="fname" required />
          </div>
          <div class="input-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
          </div>
        </div>
        <div class="input-row">
          <div class="input-group">
            <label for="lname">Last name:</label>
            <input type="text" id="lname" name="lname" required />
          </div>
          <div class="input-group">
            <label for="complaint-date">Date:</label>
            <input type="date" id="complaint-date" name="date" required />
          </div>
        </div>
        <button type="submit">Submit</button>
      </form>
    </div>
    <script src="complaint_form.js"></script>
  </body>
</html>
