<!DOCTYPE html>
<html>
    <head>
        <title>Theme Park Login | Employee Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="employee_login.css">
    </head>
    <body>
        <!--Create box for username and password-->
        <form id="employee_login_form" class="login-form" action="/employee_login.html" method="POST"> 
            <br><br>
            <!--username text box-->
            <div>
                <label for="username">Username:</label>
                <input type="username" id="username" name="username" class="username-textbox" maxlength="30" placeholder="username" required>
            </div>

            <br>
            <!--password text box-->
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" class="password-textbox" minlength="8" maxlength="30" placeholder="password" required>
            </div>
            
            <br>
            <!--login button-->
            <div>
                <button type="submit" id="login" class="login-button">Login</button>
            </div>
        </form>

        <script>
            async function verifyLogin(userLogin) {
                console.log('input username: ' + username + ', input password: ' + password);

                const response = await fetch("/employee_login.html", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(userLogin),
                });

                const data = await response.json();

                window.location.href = data.redirect;
            }

            employee_login_form.addEventListener("submit", function (event) {
                event.preventDefault();

                console.log('reached employee_login_form event listener');

                const usernameValue = document.getElementById('username').value;
                const passwordValue = document.getElementById('password').value;

                const userLogin = {
                    "username": usernameValue,
                    "password": passwordValue
                }

                verifyLogin(userLogin);
            });
        </script>
    </body>
</html>
