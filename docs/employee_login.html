<!DOCTYPE html>
<html>
    <head>
        <title>Theme Park Login | Employee Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="employee_login.css">
    </head>
    <body>
        <!--Create box for username and password-->
        <form id="employee_login_form" class="login-form" action="/employee_login.html" method="POST"> 
            <br><br>
            <!--username text box-->
            <div>
                <label for="username">Username:</label>
                <input type="username" id="username" name="username" class="username-textbox" maxlength="30" placeholder="username" required>
            </div>

            <br>
            <!--password text box-->
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" class="password-textbox" minlength="8" maxlength="30" placeholder="password" required>
            </div>
            
            <br>
            <!--login button-->
            <div>
                <button type="submit" onclick="verifyLogin(username, password)" id="login" class="login-button">Login</button>
            </div>
        </form>

        <script>
            async function verifyLogin(username, password) {
                const in_username = document.getElementByID('username').value;
                const in_password = document.getElementByID('password').value;

                const response = await fetch("/employee_login.html", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({username: in_username, password: in_password}),
                });

                const data = await response.json();

                window.location.href = data.redirect;
            }
        </script>
    </body>
</html>
