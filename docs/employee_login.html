<!DOCTYPE html>
<html>
    <head>
        <title>Theme Park Login | Employee Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="employee_login.css">
    </head>
    <body>
        <!--Create box for username and password-->
        <form id="employee_login_form" class="login-form"> 
            <br><br>
            <!--username text box-->
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" class="username-textbox" maxlength="30" placeholder="username" required>
            </div>

            <br>
            <!--password text box-->
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" class="password-textbox" minlength="8" maxlength="30" placeholder="password" required>
            </div>
            <br>
            <p id="err-msg" style="display:none; color:red;">Invalid username or password</p>
            
            <br>
            <!--login button-->
            <div>
                <button type="submit" id="login" class="login-button">Login</button>
            </div>
        </form>

        <script>
            document.getElementById("employee_login_form").addEventListener("submit", async function (event) {
                event.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                const errMsg = document.getElementById('err-msg');
                errMsg.style.display = "none";

                try {
                    const response = await fetch("/employee_login", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({username, password})
                    });

                    const data = await response.json();
                    if(data.redirect === "/employee.html") {
                        window.location.href = data.redirect;
                    }
                    else {
                        errMsg.style.display = "block";
                    }
                } catch(err) {
                    errMsg.style.display = "block";
                    errMsg.display = "Server Error. Please try again later.";
                }

                
            });
        </script>
    </body>
</html>
